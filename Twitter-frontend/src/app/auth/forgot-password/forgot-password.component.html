<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background:#0d0f14;">
  <div class="card border-0 rounded-4 p-4 p-md-5 mx-3"
       style="width:100%; max-width:420px; background:#161b24;">

    <!-- Logo -->
    <h1 class="text-center fw-bold mb-4" style="color:#1d9bf0; font-size:26px;">
      <i class="bi bi-twitter-x me-2"></i>Twitter
    </h1>

    <!-- Step 1: Enter Email -->
    <ng-container *ngIf="!submitted">
      <h2 class="text-white text-center fw-bold mb-1" style="font-size:22px;">
        Reset your password
      </h2>
      <p class="text-center mb-4" style="color:#6b7a99; font-size:14px;">
        Enter your email and we'll send you a reset link
      </p>
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-4">
          <label for="email" class="d-block mb-2 fw-semibold" style="color:#a8b4cc; font-size:13px;">
            Email Address
          </label>
          <input
            id="email"
            type="email"
            class="form-control py-3"
            formControlName="email"
            placeholder="you@example.com"
            [class.is-invalid]="isInvalid('email')"
          />

          <div class="mt-1" style="color:#f91880; font-size:12px;"
               *ngIf="isInvalid('email')">
            <span *ngIf="f['email'].errors?.['required']">Email is required.</span>
            <span *ngIf="f['email'].errors?.['pattern']">
              Enter a valid email (.com, .org, .in).
            </span>
          </div>
        </div>

        <div class="d-grid mb-3">
          <button type="submit"
                  class="btn text-white fw-bold py-3 rounded-pill"
                  style="background:#1d9bf0; font-size:15px;"
                  [disabled]="isLoading">
            <span *ngIf="!isLoading">Send Reset Link</span>
            <span *ngIf="isLoading">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Sending…
            </span>
          </button>
        </div>
      </form>
    </ng-container>

    <!-- Step 2: Success State -->

    <div class="text-center py-3" *ngIf="submitted">
      <i class="bi bi-envelope-check-fill mb-3 d-block"
         style="font-size:52px; color:#00ba7c;"></i>
      <h4 class="text-white fw-bold mb-2">Check your inbox!</h4>
      <p style="color:#6b7a99; font-size:14px;" class="mb-4">
        If an account exists for
        <strong class="text-white">{{ emailSent }}</strong>,
        a password reset link has been sent.
      </p>

      <div class="d-grid">
        <button class="btn text-white fw-bold py-3 rounded-pill"
                style="background:#1d9bf0; font-size:15px;"
                routerLink="/login">
          Back to Login
        </button>
      </div>
    </div>

    <!-- Back to login link (only on step 1) -->

    <p class="text-center mt-3 mb-0" style="color:#6b7a99; font-size:14px;"
       *ngIf="!submitted">
      Remember your password?
      <a routerLink="/login" class="fw-bold ms-1"
         style="color:#1d9bf0; text-decoration:none;">
        Sign in
      </a>
    </p>
  </div>
</div>

server:
  port: ${PORT:8081}
spring:
  application:
    name: user-service
  datasource:
    url:  jdbc:mysql://localhost:3306/twitter_user_db?createDatabaseIfNotExist=true&useSSL=false
    password: root
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery: 
        register: true
        prefer-ip-address: true
        instance-id: ${spring.application.name}:${server.port}
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
